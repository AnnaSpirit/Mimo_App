<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pixel_paws_style.css">
    <title>Pixel Paws</title>
</head>

<body>
    <h1>Pixel Paws</h1>
    <div class="pet-container">
        <div class="pet" id="pet1" onclick="selectPet(1)">
            <div class="emoji">🐯</div>
            <p>Saturation Level: <span id="hunger1">100</span>%</p>
            <p id="message1"></p>
        </div>
        <div class="pet" id="pet2" onclick="selectPet(2)">
            <div class="emoji">🐼</div>
            <p>Saturation Level: <span id="hunger2">100</span>%</p>
            <p id="message2"></p>
        </div>
    </div>
    <div class="treat-container">
        <div class="treat-wrapper">
            <div class="emoji treat" onclick="feedPet(1)" id="treat1">🍗</div>
        </div>
        <div class="treat-wrapper">
            <div class="emoji treat" onclick="feedPet(5)" id="treat2">🎍</div>
        </div>
    </div>
    <script src="pixel_paws_script.js"></script>
</body>

</html>
